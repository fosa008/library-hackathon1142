<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Library Intelligence System</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 40px; background-color: #f4f7f6; color: #333; }
        h1 { color: #2c3e50; border-bottom: 2px solid #e07a5f; padding-bottom: 10px; }
        h2 { color: #34495e; }
        .ai-box { background: #eaf2f8; border-left: 5px solid #2980b9; padding: 20px; border-radius: 8px; margin-bottom: 30px; }
        .container { display: flex; gap: 30px; margin-top: 20px; }
        .box { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); flex: 1; }
        ul { list-style-type: none; padding: 0; }
        li { padding: 12px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; }
        input[type="text"] { padding: 10px; width: 250px; border: 1px solid #ccc; border-radius: 4px; }
        button { background: #e07a5f; color: white; border: none; padding: 10px 16px; cursor: pointer; border-radius: 4px; transition: 0.2s; font-weight: bold; }
        button:hover { background: #d06a4f; }
        .btn-inline { padding: 6px 12px; font-weight: normal; }
        .badge { display: inline-block; padding: 4px 10px; border-radius: 12px; font-weight: bold; font-size: 0.9em; background: #2980b9; color: white; }
    </style>
</head>
<body>

    <h1>📚 Library Intelligence System</h1>
    
    <div class="ai-box">
        <h2>🤖 DM / ML: Decision Tree Reader Profile Classification</h2>
        <p>Enter a borrower's name to calculate features from the database and trace their classification logic pathway:</p>
        <input type="text" id="borrower-search" placeholder="Type name (e.g., Alice, Frank, Bob)">
        <button onclick="analyzeBorrower()">Run Classification Tree</button>
        
        <div id="classification-output" style="margin-top: 15px;"></div>
    </div>
    
    <div class="container">
        <div class="box">
            <h2>Available Library Books</h2>
            <ul id="books-list"></ul>
        </div>
        <div class="box">
            <h2>Borrowing History Records</h2>
            <ul id="borrow-list"></ul>
        </div>
    </div>

    <script>
        async function loadData() {
            try {
                const bookRes = await fetch('/api/books');
                const books = await bookRes.json();
                document.getElementById('books-list').innerHTML = books.map(b => {
                    const id = b.id || b.ID;
                    const title = b.title || b.TITLE;
                    return `
                        <li>
                            <div><strong>${title}</strong><br><small style="color: #7f8c8d;">by ${b.author || b.AUTHOR} | ${b.genre || b.GENRE}</small></div>
                            <button class="btn-inline" onclick="borrowBook(${id})">Borrow</button>
                        </li>
                    `;
                }).join('');

                const borrowRes = await fetch('/api/borrowed');
                const borrowed = await borrowRes.json();
                document.getElementById('borrow-list').innerHTML = borrowed.map(br => `
                    <li>
                        <div>📖 <strong>"${br.title || br.TITLE}"</strong> borrowed by <span style="color: #e07a5f;"><strong>${br.borrower_name || br.BORROWER_NAME}</strong></span><br>
                        <small style="color: #95a5a6;">Date Indexed: ${br.borrow_date || br.BORROW_DATE}</small></div>
                    </li>
                `).join('');
            } catch (e) { console.error(e); }
        }

       async function analyzeBorrower() {
            const name = document.getElementById('borrower-search').value.trim();
            if (!name) return;

            const out = document.getElementById('classification-output');
            out.innerHTML = "Calculating features from relational metrics...";

            try {
                const typeRes = await fetch(`/api/borrowers/${encodeURIComponent(name)}/type`);
                if (!typeRes.ok) throw new Error(`Backend API returned status ${typeRes.status}`);
                const typeData = await typeRes.json();

                const recRes = await fetch(`/api/borrowers/${encodeURIComponent(name)}/recommendations`);
                const recData = await recRes.json();

                let recsHtml = recData.map(b => `<li>📚 ${b.title || b.TITLE} (${b.genre || b.GENRE})</li>`).join('');
                if(!recsHtml) recsHtml = "<li>No specific recommendations available.</li>";

                out.innerHTML = `
                    <div style="background: white; padding: 20px; border-radius: 6px; margin-top: 15px; border: 2px solid #2ecc71;">
                        <h3 style="color: #27ae60; margin-top: 0;">🏆 Machine Learning Profile Report: ${typeData.borrowerName}</h3>
                        
                        <table style="width: 100%; border-collapse: collapse; margin-bottom: 15px;">
                            <tr style="background: #f8f9fa;">
                                <th style="padding: 8px; border: 1px solid #ddd; text-align: left;">Extracted Feature</th>
                                <th style="padding: 8px; border: 1px solid #ddd; text-align: center;">Value</th>
                            </tr>
                            <tr>
                                <td style="padding: 8px; border: 1px solid #ddd;">📚 Total Borrow Count</td>
                                <td style="padding: 8px; border: 1px solid #ddd; text-align: center;"><strong>${typeData.totalBorrows}</strong></td>
                            </tr>
                            <tr>
                                <td style="padding: 8px; border: 1px solid #ddd;">📖 Distinct Books Borrowed</td>
                                <td style="padding: 8px; border: 1px solid #ddd; text-align: center;"><strong>${typeData.distinctBooks}</strong></td>
                            </tr>
                            <tr>
                                <td style="padding: 8px; border: 1px solid #ddd;">📊 Top Genre Concentration</td>
                                <td style="padding: 8px; border: 1px solid #ddd; text-align: center;"><strong>${typeData.singleGenrePct.toFixed(1)}%</strong> (${typeData.topGenre})</td>
                            </tr>
                        </table>

                        <p>🎯 <strong style="color: #2c3e50;">Decision Engine Output:</strong> <span style="background: #2ecc71; color: white; padding: 3px 8px; border-radius: 4px; font-weight: bold;">${typeData.readerType}</span></p>
                        <p>🌿 <strong>Optimized Hierarchical Path:</strong> <span style="color: #555; font-style: italic;">${typeData.reasoning}</span></p>
                        
                        <hr style="border: 0; border-top: 1px dashed #ccc; margin: 15px 0;">
                        <h4>🎁 Personalized Recommendations:</h4>
                        <ul>${recsHtml}</ul>
                    </div>
                `;
            } catch (error) {
                console.error(error);
                out.innerHTML = `<div style="color: #e74c3c; background: #fadbd8; padding: 15px; border-radius: 6px; margin-top: 15px;">
                    ❌ <strong>System Error:</strong> ${error.message}
                </div>`;
            }
        }

        async function borrowBook(id) {
            const name = prompt("Enter borrower name:");
            if (!name || !name.trim()) return;
            await fetch(`/api/borrow?bookId=${id}&borrowerName=${encodeURIComponent(name)}`, { method: 'POST' });
            loadData();
        }

        document.addEventListener("DOMContentLoaded", loadData);
    </script>
</body>
</html>
